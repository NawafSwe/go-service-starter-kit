GENERAL:
  SERVICE_NAME: go-backend-template
  APP_VERSION: 1.0.0
  APP_ENVIRONMENT: development
  LOG_LEVEL: info
  TRACING:
    ENABLED: false
    RECEIVER_ENDPOINT: ""

HTTP:
  PORT: 8080
  SHUTDOWN_TIMEOUT: 15s
  READ_TIMEOUT: 10s
  READ_HEADER_TIMEOUT: 5s
  WRITE_TIMEOUT: 10s

GRPC:
  PORT: 50051
  SHUTDOWN_TIMEOUT: 15s

CONSUMER:
  BROKERS: []
  GROUP_ID: go-backend-kit-consumer
  TOPICS: []

DB:
  DSN: ""
  MAX_OPEN_CONNECTIONS: 20
  MAX_IDLE_CONNECTIONS: 10
  MAX_CONNECTIONS_LIFETIME: 3h

JWT:
  SECRET: ""
  TTL: 24h
  ISSUER: go-backend-kit

METRICS:
  ENABLED: false

AUTHORIZATION_MOCK:
  ENABLED: false
  USER_ID: "23456"
  DEVICE_ID: "3450395"

ENDPOINTS:
  EXAMPLE_CREATE:
    DEADLINE: 5s
    RATE_LIMITER:
      INTERVAL: 1m
      LIMIT: 100
  EXAMPLE_GET:
    DEADLINE: 5s
    RATE_LIMITER:
      INTERVAL: 1m
      LIMIT: 200
  EXAMPLE_LIST:
    DEADLINE: 10s
    RATE_LIMITER:
      INTERVAL: 1m
      LIMIT: 200
  EXAMPLE_DELETE:
    DEADLINE: 5s
    RATE_LIMITER:
      INTERVAL: 1m
      LIMIT: 50

CLIENTS:
  HTTP:
    JSON_EXAMPLE:
      NAME: json-example
      BASE_URL: https://jsonplaceholder.typicode.com
      TIMEOUT: 10s
      MAX_RETRIES: 3
      RETRY_WAIT_MIN: 100ms
      RETRY_WAIT_MAX: 2s
      CIRCUIT_BREAKER:
        MAX_REQUESTS: 5
        INTERVAL: 30s
        TIMEOUT: 60s
        THRESHOLD: 5
  GRPC:
    EXAMPLE:
      NAME: example-grpc
      ADDRESS: localhost:50051
      TIMEOUT: 10s
      MAX_RETRIES: 3
      RETRY_WAIT_MIN: 100ms
      RETRY_WAIT_MAX: 2s
      CIRCUIT_BREAKER:
        MAX_REQUESTS: 5
        INTERVAL: 30s
        TIMEOUT: 60s
        THRESHOLD: 5
