syntax = "proto3";

package example.v1;

// Simplified proto for k6 load testing — google.protobuf.Timestamp is replaced
// with string fields since k6's gRPC client does not support well-known types.

service ExampleService {
  rpc CreateExample(CreateExampleRequest) returns (ExampleResponse);
  rpc GetExample(GetExampleRequest) returns (ExampleResponse);
  rpc ListExamples(ListExamplesRequest) returns (ListExamplesResponse);
  rpc DeleteExample(DeleteExampleRequest) returns (DeleteExampleResponse);
}

message CreateExampleRequest {
  string name = 1;
}

message GetExampleRequest {
  string id = 1;
}

message ListExamplesRequest {}

message DeleteExampleRequest {
  string id = 1;
}

message ExampleResponse {
  Example example = 1;
}

message ListExamplesResponse {
  repeated Example examples = 1;
}

message DeleteExampleResponse {}

message Example {
  string id         = 1;
  string name       = 2;
  string created_at = 3;
  string updated_at = 4;
}
